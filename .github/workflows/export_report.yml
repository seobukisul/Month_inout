name: Monthly Export Report

on:
  schedule:
    # 한국 시간 기준 매월 1일 오전 11시 30분 (KST = UTC+9, 11:30 KST = 02:30 UTC)
    - cron: '30 2 1 * *'
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 pymupdf google-genai matplotlib python-dotenv

      - name: Run script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}
          PROXY_URL: ${{ secrets.PROXY_URL }}
        run: python main.py
